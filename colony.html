<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colony Planner - TimberMath</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="header-title"><h1>TimberMath</h1></a>
    <nav class="header-nav">
      <a href="progression.html" class="nav-link">Progression Graph</a>
      <a href="colony.html" class="nav-link active">Colony Planner</a>
      <a href="reference.html" class="nav-link">Reference</a>
    </nav>
    <div class="header-controls">
      <select id="faction-select">
        <option value="Folktails">Folktails</option>
        <option value="IronTeeth">Iron Teeth</option>
      </select>
    </div>
  </header>

  <main>
    <div class="colony-params">
      <div class="pop-grid">
        <div class="pop-param">
          <label for="beaver-count">Beavers</label>
          <input type="number" id="beaver-count" value="12" min="0">
        </div>
        <div class="pop-param">
          <label for="bot-count">Bots</label>
          <input type="number" id="bot-count" value="0" min="0">
        </div>
        <div class="pop-divider"></div>
        <div class="pop-param">
          <label for="productivity">Productivity %</label>
          <input type="number" id="productivity" value="80" min="0" max="100" step="5">
        </div>
        <div class="pop-param">
          <label for="temperate-days">
            Temperate days
            <span class="hint-trigger" tabindex="0" id="temperate-hint">?<span class="hint-tooltip" id="temperate-hint-tooltip"></span></span>
          </label>
          <input type="number" id="temperate-days" value="13" min="0" step="0.5">
        </div>
        <div class="pop-param">
          <label for="drought-days">
            Drought days
            <span class="hint-trigger" tabindex="0" id="drought-hint">?<span class="hint-tooltip" id="drought-hint-tooltip"></span></span>
          </label>
          <input type="number" id="drought-days" value="9" min="0" step="0.5">
        </div>
      </div>
    </div>
    <div class="colony-layout">
      <div class="colony-roster">
        <h3>Building Roster</h3>
        <div class="roster-add">
          <input type="text" id="roster-search" placeholder="Add building or resource...">
          <div id="roster-dropdown" class="roster-dropdown hidden"></div>
        </div>
        <div id="roster-list"></div>
        <div id="colony-costs"></div>
      </div>
      <div class="colony-output">
        <div id="colony-needs" class="balance-section"></div>
        <div id="colony-production" class="balance-section"></div>
        <div id="colony-drought" class="balance-section"></div>
      </div>
    </div>
  </main>

  <script type="module" src="js/colony-page.js"></script>
</body>
</html>
